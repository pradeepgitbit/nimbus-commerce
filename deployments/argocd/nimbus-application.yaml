apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nimbus-commerce
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/pradeepgitbit/NimbusCommerce.git
    targetRevision: main
    path: helm/nimbus-commerce

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:

    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true