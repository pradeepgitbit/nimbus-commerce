
# Replica count
replicaCount: 1

# Docker Images
images:
  product:
    repository: 189624918883.dkr.ecr.ap-south-1.amazonaws.com/nimbus-product
    tag: "6a7451a3fee809d0bb3a9ea68241095c61ba2515"

  inventory:
    repository: 189624918883.dkr.ecr.ap-south-1.amazonaws.com/nimbus-inventory
    tag: "6a7451a3fee809d0bb3a9ea68241095c61ba2515"

  gateway:
    repository: 189624918883.dkr.ecr.ap-south-1.amazonaws.com/nimbus-gateway
    tag: "6a7451a3fee809d0bb3a9ea68241095c61ba2515"

  postgres:
    repository: postgres
    tag: "6a7451a3fee809d0bb3a9ea68241095c61ba2515"

# Service Ports
service:
  gateway: 8083
  product: 8081
  inventory: 8082
  postgres: 5432

# PostgreSQL
postgres:
  database: nimbus
  username: postgres
  password: postgres

# Resources
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"

  limits:
    cpu: "500m"
    memory: "512Mi"

# HPA
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 70