apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nimbus-ingress

spec:
  ingressClassName: nginx

  rules:
  - host: nimbus.local

    http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:
            name: apigateway-service

            port:
              number: 8083